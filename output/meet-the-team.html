{{define "content"}}
<style>
  /* --- Global Team Styles --- */
.team-section {
    padding: 80px 5%;
    text-align: center;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
}

.team-title {
    font-size: 4rem;
    font-weight: 800;
    margin-bottom: 60px;
}

/* --- National Team (Rectangular) --- */
.national-team { background-color: #ffffff; }

.team-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 40px;
}

.portrait-rect img {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    margin-bottom: 20px;
}

.role {
    font-size: 0.9rem;
    color: #666;
    letter-spacing: 1px;
    margin-bottom: 20px;
    text-transform: uppercase;
}

.contact-btn {
    display: inline-block;
    padding: 12px 35px;
    border: 2px solid #000;
    border-radius: 50px;
    color: #000;
    text-decoration: none;
    font-weight: 700;
    transition: 0.3s;
}

.contact-btn:hover {
    background: #000;
    color: #fff;
}

/* --- Board of Directors (Circular) --- */
.board-directors {
    background-color: #037EF3;
    color: white;
}

.board-title {
    font-size: 4.5rem;
    font-weight: 800;
    margin-bottom: 60px;
    text-align: left;
}

.board-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 30px;
}

.portrait-circle img {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 20px;
    border: 4px solid white; /* Optional: gives that clean ring look */
}

.board-role {
    font-weight: 800;
    font-size: 1.1rem;
    margin-bottom: 5px;
}

.bio {
    font-size: 0.85rem;
    opacity: 0.9;
    line-height: 1.4;
}
</style>
<section class="team-section national-team">
    <div class="container">
        <h1 class="team-title">Meet the Team</h1>
        
        <div class="team-grid">
            <div class="member-card">
                <div class="portrait-rect">
                    <img src="/static/images/placeholder-portrait.jpg" alt="Team Member">
                </div>
                <h3>Mina Nepali</h3>
                <p class="role">NATIONAL PRESIDENT</p>
                <a href="#" class="contact-btn">Contact</a>
            </div>
            </div>
    </div>
</section>

<section class="team-section board-directors">
    <div class="container">
        <h2 class="board-title">Our Board of Directors</h2>
        
        <div class="board-grid">
            <div class="board-card">
                <div class="portrait-circle">
                    <img src="/static/images/placeholder-circle.jpg" alt="Director">
                </div>
                <h3>Sarah Sun</h3>
                <p class="board-role">DIRECTOR</p>
                <p class="bio">Senior Director, Risk Modelling, RBC</p>
            </div>
            </div>
    </div>
</section>

{{end}}
