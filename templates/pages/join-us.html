{{define "content"}}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
    --aiesec-blue: #037EF3;
    --aiesec-purple: #7754B6;
}

body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; color: #333; overflow-x: hidden; }

/* --- 1. HERO SECTION --- */
.hero-join {
    height: 85vh;
    background: url('/static/images/becomeanaisecr.webp') no-repeat center center;
    background-size: cover;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #fff;
    padding: 0 10%;
}

.hero-join h1 { 
    font-size: clamp(2.5rem, 6vw, 4.5rem); 
    font-weight: 1000; 
    line-height: 1.1; 
    text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
}

/* --- 2. LOCAL CHAPTER --- */
.map-section { 
    padding: 80px 10%; 
    text-align: center; 
    background-color: var(--aiesec-blue); 
    color: #fff;
}

.map-section h2 { 
    font-size: 3.5rem; 
    font-weight: 1000; 
    margin-bottom: 40px; 
}

.map-container img { 
    max-width: 100%; 
    height: auto; 
    border-radius: 4px; 
}

/* --- 3. SIGNUP SECTION --- */
.form-outer-wrapper {
    background: linear-gradient(to bottom, var(--aiesec-blue), var(--aiesec-purple));
    padding: 80px 5% 120px 5%;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.form-header-text { 
    color: #fff; 
    font-size: 3.5rem; 
    font-weight: 1000; 
    margin-bottom: 50px; 
    text-align: center; 
}

.signup-iframe-wrap {
    width: 100%;
    max-width: 750px;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 30px 60px rgba(0,0,0,0.3);
}

.signup-iframe-wrap iframe {
    width: 100%;
    min-height: 1400px;
    border: none;
    display: block;
    background: white;
}

@media (max-width: 768px) {
    .hero-join h1, .map-section h2, .form-header-text { font-size: 2rem; }
}
</style>

<section class="hero-join">
    <h1>Are you ready to join the<br><span style="text-decoration: underline;">worlds largest youth-led</span><br>organization?</h1>
</section>

<section class="map-section">
    <h2>1. Find your Local Chapter</h2>
    <div class="map-container">
        <img src="/static/images/findlocal.webp" alt="AIESEC Canada Local Chapters Map">
    </div>
</section>

<section class="form-outer-wrapper">
    <h2 class="form-header-text">2. Signup for Membership!</h2>
    <div class="signup-iframe-wrap">
        <iframe
            id="signup_iframe"
            width="100%"
            height="1400px"
            style="border:0; box-shadow:0px 0px 16px 2px rgba(0,0,0,0.32);"
            src="https://aieseccanada.my.salesforce-sites.com/siteforms/Webform_MBRegister?invalidate=v2&utm_source=&utm_medium=&utm_campaign=&utm_term=&utm_content="
            title="AIESEC Membership Signup"
            scrolling="no"
        ></iframe>
    </div>
</section>

{{end}}
