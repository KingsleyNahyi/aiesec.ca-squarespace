{{define "content"}}
  <title>AIESEC Canada Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #fff;
      color: #333;
    }

    nav.nav-transparent {
      background: transparent !important;
      box-shadow: none !important;
    }

    nav.nav-transparent a,
    nav.nav-transparent .nav-link {
      color: #fff !important;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100%;
      height: 400px;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      filter: brightness(0.55);
    }

    .hero-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
      gap: 12px;
    }

    .hero-text h1 {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.1;
    }

    .hero-text p {
      font-size: 28px;
      font-weight: 400;
    }

    /* ── BELOW HERO ── */
    .below-hero {
      max-width: 860px;
      margin: 0 auto;
      padding: 60px 40px;
    }

    /* ── SEARCH BAR ── */
    .search-wrap {
      position: relative;
      margin-bottom: 60px;
    }

    .search-wrap input {
      width: 100%;
      padding: 18px 20px 18px 52px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 17px;
      font-family: inherit;
      color: #555;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus { border-color: #999; }

    .search-wrap svg {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
      width: 20px;
      height: 20px;
      pointer-events: none;
    }

    /* ── SEARCH DROPDOWN ── */
    .hub-search-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      z-index: 999;
      overflow: hidden;
      max-height: 420px;
      overflow-y: auto;
    }

    .hub-search-dropdown.open { display: block; }

    .hub-search-result {
      display: block;
      padding: 14px 20px;
      text-decoration: none;
      border-bottom: 1px solid #f5f5f5;
      transition: background 0.12s;
    }

    .hub-search-result:last-child { border-bottom: none; }

    .hub-search-result:hover,
    .hub-search-result:focus { background: #f5f9ff; outline: none; }

    .hub-result-section {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #1a73e8;
      margin-bottom: 3px;
    }

    .hub-result-title {
      font-size: 15px;
      font-weight: 700;
      color: #222;
      margin-bottom: 3px;
    }

    .hub-result-desc {
      font-size: 12px;
      color: #888;
      line-height: 1.45;
    }

    .hub-search-empty {
      padding: 28px 20px;
      text-align: center;
      font-size: 14px;
      color: #999;
    }

    .hub-search-footer {
      padding: 8px 20px;
      border-top: 1px solid #f0f0f0;
      font-size: 10px;
      color: #bbb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .hub-search-footer kbd {
      background: #f0f0f0;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
      color: #666;
      font-family: inherit;
      margin: 0 1px;
    }

    /* ── INTERNAL USE ROW ── */
    .internal-row {
      display: flex;
      align-items: center;
      gap: 60px;
      margin-bottom: 60px;
    }

    .internal-text {
      flex: 1;
      text-align: center;
    }

    .internal-text p {
      font-size: 22px;
      color: #333;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .internal-text p em { font-style: italic; }

    .aiesec-preview {
      flex-shrink: 0;
      width: 480px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    .aiesec-preview img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── SHOW ME BUTTON ── */
    .btn-blue {
      display: inline-block;
      padding: 14px 40px;
      border-radius: 50px;
      background: #1a73e8;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      transition: filter 0.2s, transform 0.15s;
    }
    .btn-blue:hover { filter: brightness(0.88); transform: translateY(-2px); }

    /* ── NAV BUTTONS ── */
    .nav-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: background 0.2s;
    }

    .nav-btn:hover { background: #333; }

    .nav-btn.full-width { grid-column: 1 / -1; }
  </style>

  <!-- Hero -->
  <div class="hero">
    <img src="/static/images/homepage-banner.webp" alt="AIESEC Canada group photo">
    <div class="hero-text">
      <h1>AIESEC Canada</h1>
      <p>Resources Hub</p>
    </div>
  </div>

  <!-- Below hero -->
  <div class="below-hero">

    <!-- Search bar -->
    <div class="search-wrap" id="hubSearchWrap">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
      </svg>
      <input
        type="text"
        id="hubSearchInput"
        placeholder="Anything you need is just one search away!"
        autocomplete="off"
        spellcheck="false"
      />
      <div id="hubSearchDropdown" class="hub-search-dropdown"></div>
    </div>

    <!-- Internal use blurb + aiesec.ca preview -->
    <div class="internal-row">
      <div class="internal-text">
        <p>This site is for <em>internal use</em> only. If you want to learn more about our products and services, refer to our website:</p>
        <a href="https://www.aiesec.ca/" target="_blank" class="btn-blue">Show Me</a>
      </div>
      <div class="aiesec-preview">
        <img src="/static/images/homepagewebp.webp" alt="We are AIESEC in Canada">
      </div>
    </div>

    <!-- Nav buttons -->
    <div class="nav-buttons">
      <a href="/nec-quizzes" class="nav-btn">NEC Quizzes</a>
      <a href="/resources" class="nav-btn">Resources</a>
      <a href="/conference-overview" class="nav-btn full-width">Conference Output</a>
    </div>

  </div>

<script src="/static/search-data.js"></script>
<script src="/static/search-engine.js"></script>
<script>
(function () {
  const input    = document.getElementById('hubSearchInput');
  const dropdown = document.getElementById('hubSearchDropdown');

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function render(query) {
    const q = query.trim();
    if (q.length < 2) {
      dropdown.classList.remove('open');
      dropdown.innerHTML = '';
      return;
    }

    const results = SearchEngine.search(q, 8);

    if (results.length === 0) {
      dropdown.innerHTML = `
        <div class="hub-search-empty">
          No results for "<strong>${esc(q)}</strong>" — try "OGX", "finance", "talent management"
        </div>`;
    } else {
      dropdown.innerHTML =
        results.map(({ page }) => `
          <a href="${esc(page.url)}" class="hub-search-result">
            <div class="hub-result-section">${esc(page.section)}</div>
            <div class="hub-result-title">${esc(page.title)}</div>
            <div class="hub-result-desc">${esc(page.description)}</div>
          </a>
        `).join('') +
        `<div class="hub-search-footer">
          <span><kbd>↑</kbd><kbd>↓</kbd> navigate &nbsp;<kbd>Esc</kbd> close</span>
          <span>${results.length} result${results.length !== 1 ? 's' : ''}</span>
        </div>`;
    }

    dropdown.classList.add('open');
  }

  let timer;
  input.addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(() => render(input.value), 120);
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') { dropdown.classList.remove('open'); input.blur(); }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      const first = dropdown.querySelector('.hub-search-result');
      if (first) first.focus();
    }
  });

  dropdown.addEventListener('keydown', e => {
    const items = [...dropdown.querySelectorAll('.hub-search-result')];
    const idx   = items.indexOf(document.activeElement);
    if (e.key === 'ArrowDown') { e.preventDefault(); if (idx < items.length - 1) items[idx+1].focus(); }
    if (e.key === 'ArrowUp')   { e.preventDefault(); idx > 0 ? items[idx-1].focus() : input.focus(); }
    if (e.key === 'Escape')    { dropdown.classList.remove('open'); input.focus(); }
    if (e.key === 'Enter' && document.activeElement.classList.contains('hub-search-result')) {
      document.activeElement.click();
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#hubSearchWrap')) dropdown.classList.remove('open');
  });
})();
</script>

{{end}}
