{{define "content"}}

<style>
  /* ── Hero ── */
  .hero {
    position: relative;
    min-height: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .hero-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  .hero-bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.35);
  }

  .hero-content {
    position: relative;
    z-index: 1;
    text-align: center;
    color: white;
    padding: 60px 24px;
    max-width: 800px;
  }

  .hero-content h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 700;
    line-height: 1.2;
    margin: 0;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  /* ── Signup section ── */
  .signup-section {
    background: linear-gradient(180deg, #f26522 0%, #e8471a 40%, #c44b9a 75%, #7b5ea7 100%);
    padding: 48px 24px 64px;
    text-align: center;
  }

  .signup-section h2 {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(26px, 4vw, 42px);
    font-weight: 700;
    color: white;
    margin: 0 0 32px;
  }

  .signup-graphic {
    max-width: 700px;
    width: 100%;
    margin: 0 auto 32px;
    display: block;
  }

  .signup-iframe-wrap {
    max-width: 700px;
    margin: 0 auto;
    border-radius: 12px;
    overflow: hidden;
  }

  .signup-iframe-wrap iframe {
    width: 100%;
    min-height: 900px;
    border: none;
    display: block;
    background: white;
  }
</style>

<!-- Hero -->
<section class="hero" style="min-height:420px;">
  <div class="hero-bg">
    <img src="/static/images/signup.webp" alt="">
  </div>
  <div class="hero-content">
    <h1>Hi there!<br>Are you ready for the experience of a lifetime?</h1>
  </div>
</section>

<!-- Signup form section -->
<section class="signup-section">
  <img
    src="/static/images/website-element.webp"
    alt="Signup for Exchange!"
    class="signup-graphic"
  >

  <div class="signup-iframe-wrap">
    <iframe
      src="https://aiesec.us10.list-manage.com/subscribe/post?u=XXXXXXXX&id=XXXXXXXX"
      title="AIESEC Exchange Signup"
      scrolling="no"
    ></iframe>
  </div>
</section>

{{end}}
