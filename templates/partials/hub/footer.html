{{define "footer"}}
<footer class="hub-footer">
  <nav class="hub-footer__links">
    <a href="https://aiesec.ca" target="_blank" rel="noopener" class="hub-footer__link">OFFICIAL WEBSITE</a>
    <a href="https://www.facebook.com/AIESECinCanada" target="_blank" rel="noopener" class="hub-footer__link">FACEBOOK</a>
    <a href="https://www.instagram.com/aiesecincanada/" target="_blank" rel="noopener" class="hub-footer__link">INSTAGRAM</a>
  </nav>
  <p class="hub-footer__copy">AIESEC Canada Hub</p>
</footer>

<style>
  .hub-footer {
    background: #2b2b2b;
    padding: 3rem 2rem 2rem;
    text-align: center;
  }

  .hub-footer__links {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 2.5rem;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }

  .hub-footer__link {
    color: #ccc;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-decoration: none;
    transition: color 0.2s;
  }

  .hub-footer__link:hover {
    color: #fff;
  }

  .hub-footer__copy {
    color: #666;
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    margin: 0;
  }
</style>
{{end}}
